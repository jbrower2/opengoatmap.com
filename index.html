<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Open Goat Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="map"></div>

<div id="list">
  <h2>Closest goats to you</h2>
  <p class="hint">Sorted by distance. Use "Locate me" on the map first to populate this list.</p>
  <ol id="list-items"></ol>
</div>

<div class="controls">
  <button id="locate-btn" type="button">Locate me</button>
  <button id="toggle-btn" type="button">Show closest list</button>
  <a href="https://forms.gle/d8Q1PBrLLNTTDpsf6" target="_blank" rel="noopener">Add a goat</a>
  <a href="https://github.com/jbrower2/opengoatmap.com/issues/new" target="_blank" rel="noopener">Report issue</a>
</div>

<div id="status"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<script src="goats.js"></script>
<script src="app.js"></script>

</body>
</html>
